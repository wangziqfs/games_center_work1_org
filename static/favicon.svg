<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#3E1A5E"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3D3D"/>
      <stop offset="40%" style="stop-color:#E02020"/>
      <stop offset="100%" style="stop-color:#B01010"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#D4AF37" stroke-width="1.5"/>

  <!-- APEX A character -->
  <g filter="url(#glow)">
    <!-- Left leg of A -->
    <polygon points="32,8 18,52 26,52 32,34" fill="url(#logo)"/>
    <!-- Right leg of A -->
    <polygon points="32,8 46,52 38,52 32,34" fill="url(#logo)"/>
    <!-- Crossbar shortened -->
    <polygon points="26,42 38,42 35,48 29,48" fill="#FF6B6B"/>
  </g>

  <!-- Top chevron notch (APEX signature detail) -->
  <polygon points="32,8 28,16 32,13 36,16" fill="#1a0a2e"/>
</svg>
